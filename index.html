<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELTRI PROJECT</title>
    <meta name="theme-color" content="#000000">
    
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Playfair+Display:ital,wght@1,500;1,700&family=Yellowtail&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

    <style>

        @media screen and (max-width: 768px) {
            .hero-content h1 {
                font-size: 20px !important;    
                line-height: 1.2 !important;   
                margin-top: 50px !important;   
                width: 100% !important;
                text-align: center !important;
            }
            .hero-content {
                padding: 0 20px !important;
            }
        }
        
        @media screen and (min-width: 769px) {
            .hero-content h1 {
                font-size: 60px !important;   
            }
        }
    </style>
</head>
<body>

    <script>
document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        alert("❌ SECURITY PROTOCOL: Hak Akses Hanya Untuk Master Eltri!");
    });


    document.addEventListener('selectstart', function(e) {
        e.preventDefault();
    });


    document.addEventListener('keydown', function(e) {

        if (e.keyCode === 123) {
            e.preventDefault();
            alert("🛡️ ELTRI SHIELD: Akses F12 Developer Tools Dikunci!");
            return false;
        }

        if (e.ctrlKey && e.shiftKey && e.keyCode === 73) {
            e.preventDefault();
            alert("🛡️ ELTRI SHIELD: Fitur Inspect Element Dikunci!");
            return false;
        }

        if (e.ctrlKey && e.shiftKey && e.keyCode === 74) {
            e.preventDefault();
            alert("🛡️ ELTRI SHIELD: Fitur Console Dikunci!");
            return false;
        }

        if (e.ctrlKey && e.shiftKey && e.keyCode === 67) {
            e.preventDefault();
            alert("🛡️ ELTRI SHIELD: Fitur Element Selector Dikunci!");
            return false;
        }

        if (e.ctrlKey && e.keyCode === 85) {
            e.preventDefault();
            alert("🛡️ ELTRI SHIELD: Dilarang Mengintip Source Code Utama!");
            return false;
        }

        if (e.ctrlKey && e.keyCode === 83) {
            e.preventDefault();
            alert("🛡️ ELTRI SHIELD: Dilarang Mendownload Halaman Ini!");
            return false;
        }
    });

    </script>    

<div id="root"></div>

    <script src="js/index.NSMKZs.js"></script>
    <script src="js/script.dbcsje.js"></script>
    
</body>
</html>
