<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELTRI PROJECT</title>
    <meta name="theme-color" content="#000000">
    
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Playfair+Display:ital,wght@1,500;1,700&family=Yellowtail&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.min.css">
    <link rel="stylesheet" href="css/gallery.min.css">

    <style>
        @media screen and (max-width: 768px) {
            .hero-content h1 {
                font-size: 20px !important;    
                line-height: 1.2 !important;   
                margin-top: 50px !important;   
                width: 100% !important;
                text-align: center !important;
            }
            .hero-content {
                padding: 0 20px !important;
            }
        }
        
        @media screen and (min-width: 769px) {
            .hero-content h1 {
                font-size: 60px !important;   
            }
        }
    </style>
</head>
<body>

    <nav class="container-navbar">
        <div class="nav-left">
            <a href="index.html" class="logo-link">
                <img src="logo.png" class="logo" alt="Logo"> 
                <span class="brand-text">ELTRI PROJECT</span>
            </a>
        </div>

        <div class="nav-right">
            <ul class="ul-navbar" id="nav-links">
                <li><a href="index.html" class="menu-item-btn btn-gahar"><i class="fas fa-home"></i> HOME</a></li>
                <li><a href="gallery.html" class="menu-item-btn btn-gahar"><i class="fas fa-images"></i> GALLERY</a></li>
                <li><a href="Proyek.html" class="menu-item-btn btn-public btn-gahar"><i class="fas fa-user"></i> PUBLIC PROFILE</a></li>
            </ul>
            
            <div class="menu-toggle" id="mobile-menu" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>ELTRI PUTRA ROMBEBUA</h1>
        </div>
    </section>

        <section class="social-footer">
        <h3>Project Sosial</h3>
        <div class="social-icons">
            <a href="https://www.instagram.com/eltriputra?igsh=cDE5ZXllNXB4dHNo" class="icon instagram" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://x.com/eltri_putra" class="icon x-logo" target="_blank">
                <svg viewBox="0 0 24 24" aria-hidden="true" class="svg-x" style="width: 24px; height: 24px; fill: white; vertical-align: middle;">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path>
                </svg>
            </a>
        </div>
    </section>

    <section class="profile-section">
        <div class="container-flex">
            <div class="image-wrapper">
                <img src="gereja.jpg" class="img-main" alt="Gereja">
                <div class="floating-logo">
                    <img src="logo.png" alt="Floating Logo">
                </div>
            </div>

            <div class="text-wrapper">
                <span class="label-eltri">ELTRI</span>
                <h2 class="name-title">ELTRI PUTRA ROMBEBUA</h2>
                <div class="visi-content">
                    <p class="visi-text">"Tuhan Yang Maha Esa"</p>
                </div>
            </div>
        </div>
    </section>

    <script>

        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            const navLinks = document.getElementById('nav-links');
            if (menu && navLinks) {
                menu.classList.toggle('is-active');
                navLinks.classList.toggle('active');
            }
        }

        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            alert("❌ PROTOKOL KEAMANAN: Hak Akses Hanya Untuk Master Eltri!");
        });

        document.addEventListener('keydown', function(e) {
            if (e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && e.keyCode === 85) {
                e.preventDefault();
                return false;
            }
        });
    </script>
    
    <script src="js/script.js"></script>
</body>
</html>
