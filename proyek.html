    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<body>

      <script>
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            const navLinks = document.getElementById('nav-links');
            if(menu && navLinks) {
                menu.classList.toggle('is-active');
                navLinks.classList.toggle('active');
            }
        }

    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        alert("❌ SECURITY PROTOCOL: Hak Akses Hanya Untuk Master Eltri!");
    });


    document.addEventListener('selectstart', function(e) {
        e.preventDefault();
    });


    document.addEventListener('keydown', function(e) {

        if (e.keyCode === 123) {
            e.preventDefault();
            alert("🛡️ ELTRI SHIELD: Akses F12 Developer Tools Dikunci!");
            return false;
        }

        if (e.ctrlKey && e.shiftKey && e.keyCode === 73) {
            e.preventDefault();
            alert("🛡️ ELTRI SHIELD: Fitur Inspect Element Dikunci!");
            return false;
        }

        if (e.ctrlKey && e.shiftKey && e.keyCode === 74) {
            e.preventDefault();
            alert("🛡️ ELTRI SHIELD: Fitur Console Dikunci!");
            return false;
        }

        if (e.ctrlKey && e.shiftKey && e.keyCode === 67) {
            e.preventDefault();
            alert("🛡️ ELTRI SHIELD: Fitur Element Selector Dikunci!");
            return false;
        }

        if (e.ctrlKey && e.keyCode === 85) {
            e.preventDefault();
            alert("🛡️ ELTRI SHIELD: Dilarang Mengintip Source Code Utama!");
            return false;
        }

        if (e.ctrlKey && e.keyCode === 83) {
            e.preventDefault();
            alert("🛡️ ELTRI SHIELD: Dilarang Mendownload Halaman Ini!");
            return false;
        }
    });

</script>
<div id="root"></div>

</body>
</html>
