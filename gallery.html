<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - ELTRI PROJECT</title>
    <link class="fav-icon" rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.ndbxjda.css">
    <link rel="stylesheet" href="css/gallery.NKDNEMS.css">
</head>
<body>

    <script>
    function toggleMenu() {
        const menu = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('nav-links');
        if (menu && navLinks) {
            menu.classList.toggle('is-active');
            navLinks.classList.toggle('active');
        }
    }

    function openModal(imageSrc) {
        var modal = document.getElementById("galleryModal");
        var modalImg = document.getElementById("imgFull");
        if (modal && modalImg) {
            modal.style.display = "flex"; 
            modalImg.src = imageSrc;      
        }
    }

    function closeModal() {
        var modal = document.getElementById("galleryModal");
        if (modal) {
            modal.style.display = "none";  
        }
    }

    document.addEventListener('contextmenu', function(e) {
        if (e.target.tagName !== 'IMG') {
            e.preventDefault();
            alert('Sistem keamanan Anti-Error! Dilarang mencuri kodingan ELTRI PROJECT!');
        }
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === "F12" || (e.ctrlKey && e.shiftKey && e.key === "I") || (e.ctrlKey && e.key === "U")) {
             e.preventDefault();
             alert('Fitur Inspect Element Dikunci, Bang! 🦾🛡️');
        }
    });
    
    </script>
<div id="root"></div>

    <script src="js/gallery.NXMzns.js"></script>
    <script src="js/script.dbcsje.js"></script>
    
</body>
</html>
