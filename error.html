<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <link rel="icon" type="image/png" href="logo.png">
    
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/404.rumah.css">

</head>
<body>

    <script>
document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        alert("❌ SECURITY PROTOCOL: Hak Akses Hanya Untuk Master Eltri!");
    });


    document.addEventListener('selectstart', function(e) {
        e.preventDefault();
    });


    document.addEventListener('keydown', function(e) {

        if (e.keyCode === 123) {
            e.preventDefault();
            alert("🛡️ ELTRI SHIELD: Akses F12 Developer Tools Dikunci!");
            return false;
        }

        if (e.ctrlKey && e.shiftKey && e.keyCode === 73) {
            e.preventDefault();
            alert("🛡️ ELTRI SHIELD: Fitur Inspect Element Dikunci!");
            return false;
        }

        if (e.ctrlKey && e.shiftKey && e.keyCode === 74) {
            e.preventDefault();
            alert("🛡️ ELTRI SHIELD: Fitur Console Dikunci!");
            return false;
        }

        if (e.ctrlKey && e.shiftKey && e.keyCode === 67) {
            e.preventDefault();
            alert("🛡️ ELTRI SHIELD: Fitur Element Selector Dikunci!");
            return false;
        }

        if (e.ctrlKey && e.keyCode === 85) {
            e.preventDefault();
            alert("🛡️ ELTRI SHIELD: Dilarang Mengintip Source Code Utama!");
            return false;
        }

        if (e.ctrlKey && e.keyCode === 83) {
            e.preventDefault();
            alert("🛡️ ELTRI SHIELD: Dilarang Mendownload Halaman Ini!");
            return false;
        }
    });

    </script>

<div id="root"></div>

    <script src="js/rumah.katolik.js"></script>
</body>
</html>
